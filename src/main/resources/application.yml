spring:
  datasource:
    url: jdbc:postgresql://localhost:5412/dealer_inventory
    username: dealer_user
    password: dealer_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml
    enabled: true

server:
  port: 8080

logging:
  level:
    com.dealersautocenter: DEBUG
    org.springframework.security: INFO
